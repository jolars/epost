version: '3'

vars:
  DEV_CONFIG: '{{.ROOT_DIR}}/dev/config.toml'
  DEV_CACHE:  '{{.ROOT_DIR}}/dev/cache/index.sqlite'
  DEV_MAILDIR_SRC: '{{.ROOT_DIR}}/dev/maildir'
  DEV_MAILDIR_SCRATCH: '{{.ROOT_DIR}}/dev/scratch/maildir'
  DEV_MAILDIR_WORK_SRC: '{{.ROOT_DIR}}/dev/maildir-work'
  DEV_MAILDIR_WORK_SCRATCH: '{{.ROOT_DIR}}/dev/scratch/maildir-work'
  DEV_MAILDIR_FS_SRC: '{{.ROOT_DIR}}/dev/maildir-fs'
  DEV_MAILDIR_FS_SCRATCH: '{{.ROOT_DIR}}/dev/scratch/maildir-fs'
  SENT_STUB_DIR: '/tmp/epost-sent'

env:
  RUST_LOG: epost=debug,warn
  RUST_BACKTRACE: '1'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  dev:
    desc: Auto-rebuild + restart on file change (main loop)
    deps: [_maildir:ensure, _maildir:ensure:work, _maildir:ensure:fs]
    cmds:
      - bacon run -- -- --config {{.DEV_CONFIG}} --cache {{.DEV_CACHE}}

  run:
    desc: One-shot debug run against dev/config.toml
    deps: [_maildir:ensure, _maildir:ensure:work, _maildir:ensure:fs]
    cmds:
      - cargo run -- --config {{.DEV_CONFIG}} --cache {{.DEV_CACHE}}

  run:release:
    desc: One-shot release run
    deps: [_maildir:ensure, _maildir:ensure:work, _maildir:ensure:fs]
    cmds:
      - cargo run --release -- --config {{.DEV_CONFIG}} --cache {{.DEV_CACHE}}

  build:
    desc: cargo build
    cmds:
      - cargo build

  build:release:
    desc: cargo build --release
    cmds:
      - cargo build --release

  fmt:
    desc: cargo fmt --all
    cmds:
      - cargo fmt --all

  fmt:check:
    desc: cargo fmt --all -- --check
    cmds:
      - cargo fmt --all -- --check

  lint:
    desc: cargo clippy --all-targets -- -D warnings
    cmds:
      - cargo clippy --all-targets -- -D warnings

  check:
    desc: cargo check --all-targets
    cmds:
      - cargo check --all-targets

  test:
    desc: cargo test
    cmds:
      - cargo test

  ci:
    desc: 'fmt:check + lint + test (what CI would run)'
    deps: [fmt:check, lint, test]

  snap:review:
    desc: Review pending insta snapshots interactively
    cmds:
      - cargo insta review

  snap:accept:
    desc: Accept all pending insta snapshots
    cmds:
      - cargo insta accept

  sent:clear:
    desc: Wipe the dev msmtp-stub sent-message directory
    cmds:
      - rm -rf {{.SENT_STUB_DIR}}
      - mkdir -p {{.SENT_STUB_DIR}}

  index:reset:
    desc: Delete the dev sqlite index cache (forces full rescan on next run)
    cmds:
      - rm -f {{.DEV_CACHE}}

  _maildir:ensure:
    desc: Bootstrap dev/scratch/maildir from dev/maildir if missing
    internal: true
    status:
      - test -d {{.DEV_MAILDIR_SCRATCH}}
    cmds:
      - mkdir -p {{.DEV_MAILDIR_SCRATCH}}
      # cp -a preserves mtimes / flag-suffix filenames byte-for-byte so
      # the first scan of the scratch maildir mirrors the tracked one.
      # `/.` copies the contents (incl. dotfile subfolders like .Sent).
      - cp -a {{.DEV_MAILDIR_SRC}}/. {{.DEV_MAILDIR_SCRATCH}}/

  _maildir:ensure:work:
    desc: Bootstrap dev/scratch/maildir-work from dev/maildir-work if missing
    internal: true
    status:
      - test -d {{.DEV_MAILDIR_WORK_SCRATCH}}
    cmds:
      - mkdir -p {{.DEV_MAILDIR_WORK_SCRATCH}}
      - cp -a {{.DEV_MAILDIR_WORK_SRC}}/. {{.DEV_MAILDIR_WORK_SCRATCH}}/

  _maildir:ensure:fs:
    desc: Bootstrap dev/scratch/maildir-fs from dev/maildir-fs if missing
    internal: true
    status:
      - test -d {{.DEV_MAILDIR_FS_SCRATCH}}
    cmds:
      - mkdir -p {{.DEV_MAILDIR_FS_SCRATCH}}
      - cp -a {{.DEV_MAILDIR_FS_SRC}}/. {{.DEV_MAILDIR_FS_SCRATCH}}/

  maildir:reset:
    desc: Wipe dev/scratch/maildir* and re-mirror from tracked sources (also clears index cache)
    cmds:
      - rm -rf {{.DEV_MAILDIR_SCRATCH}}
      - rm -rf {{.DEV_MAILDIR_WORK_SCRATCH}}
      - rm -rf {{.DEV_MAILDIR_FS_SCRATCH}}
      - rm -f {{.DEV_CACHE}}
      - task: _maildir:ensure
      - task: _maildir:ensure:work
      - task: _maildir:ensure:fs

  doctor:
    desc: Smoke-check the devshell and fixtures
    cmds:
      - command -v cargo  >/dev/null && echo "ok cargo"   || echo "MISSING cargo"
      - command -v bacon  >/dev/null && echo "ok bacon"   || echo "MISSING bacon"
      - command -v mold   >/dev/null && echo "ok mold"    || echo "MISSING mold"
      - command -v mbsync >/dev/null && echo "ok mbsync"  || echo "MISSING mbsync"
      - command -v msmtp  >/dev/null && echo "ok msmtp"   || echo "MISSING msmtp"
      - test -f {{.DEV_CONFIG}}      && echo "ok dev/config.toml" || echo "MISSING dev/config.toml"
      - test -x {{.ROOT_DIR}}/dev/msmtp-stub && echo "ok dev/msmtp-stub" || echo "MISSING/non-exec dev/msmtp-stub"
    silent: true
