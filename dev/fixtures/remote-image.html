<!doctype html>
<html>
  <body>
    <h1>Remote tracking pixel — never fetched</h1>
    <p>The image below is a remote URL. The renderer must show it as a
    <code>[remote image: ...]</code> placeholder and never issue an HTTP
    request.</p>
    <p><img src="https://tracker.example.invalid/p.gif?u=42" alt="tracking pixel"></p>
    <p>Real link for the picker:
    <a href="https://example.invalid/news">news</a>,
    <a href="mailto:dev@example.invalid">mailto</a>.</p>
  </body>
</html>
