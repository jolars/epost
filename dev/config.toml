# Development config used by `task dev` / `task run`.
#
# Points at the in-repo fixture maildir and a stub msmtp so the app has
# something to render without needing a real mbsync/msmtp setup. Selected
# explicitly via `--config dev/config.toml` (the binary defaults to
# $XDG_CONFIG_HOME/epost/config.toml for real use).

[ui]
sidebar = true
list = true
reader = true

[smtp]
command = ["./dev/msmtp-stub"]

[reader]
prefer = "html"
# `:open` (and the `f` link picker) shells out to this command, appending
# the target path/URL as the final argument. Pointed at the in-repo stub
# so dev runs and tests don't fire a real browser.
browser = ["./dev/browser-stub"]
# Reader yanks (`Y` / `yp` / `yl`) emit OSC 52 by default — uncomment to
# pipe the selected text to this command's stdin instead, for tmux or
# terminals where OSC 52 is disabled.
# clipboard = ["wl-copy"]
# Mouse-drag selection in the reader pane. Default true. Disable to
# keep the terminal's native drag-select and middle-click paste.
# mouse = false

[search]
# Folders covered by `g/` (global) search, in priority order. Empty list
# means "every folder, score-only ranking." Trash/Spam are excluded by
# default; add them here if you want them in the global haystack.
global_folders = ["INBOX", "Archive", "Sent"]

[images]
# `auto` probes the terminal for kitty / iTerm2 / sixel; if the probe
# fails or `[images].protocol = "off"`, every inline image renders as
# the `[image: alt]` placeholder. Override to pin a specific protocol on
# terminals where auto-detection misfires.
protocol = "auto"
max_height_cells = 24

# Three dev accounts pointing at scratch maildirs. `dev/maildir/`,
# `dev/maildir-work/`, and `dev/maildir-verbatim/` are the tracked,
# immutable fixtures; `task dev` / `task run` mirror them into
# `dev/scratch/maildir{,-work,-verbatim}/` on first use so interactive
# flag flips and folder moves stay out of git. Run `task maildir:reset`
# to rebuild every scratch tree from the tracked sources.
#
# `layout` defaults to "verbatim" (real subdirectories — what mbsync
# produces under `SubFolders Verbatim`); the dev and work accounts opt
# back into "maildir++" so both code paths stay live under `task dev`.

[accounts.dev]
maildir = "./dev/scratch/maildir"
from = "Dev <dev@example.invalid>"
layout = "maildir++"
sent = "Sent"
archive = "Archive"
spam = "Spam"
trash = "Trash"

[accounts.work]
maildir = "./dev/scratch/maildir-work"
from = "Dev <dev@work.example>"
layout = "maildir++"
sent = "Sent"
archive = "Archive"
spam = "Spam"
trash = "Trash"

[accounts.verbatim]
maildir = "./dev/scratch/maildir-verbatim"
from = "Verbatim <verbatim@example.invalid>"
sent = "Sent"
archive = "Archive"
spam = "Spam"
trash = "Trash"
